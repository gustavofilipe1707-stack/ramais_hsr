<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HSR - Reciclagem Ramais Vonix v3</title>
    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --success: #27ae60; --blue: #3498db; --purple: #8e44ad; --orange: #e67e22; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #ecf0f1; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header { border-bottom: 3px solid var(--primary); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; }
        h1 { color: var(--primary); margin: 0; font-size: 18px; text-transform: uppercase; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .setup-box { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        .setup-box strong { display: block; margin-bottom: 5px; color: var(--primary); font-size: 12px; }
        
        textarea { width: 100%; height: 220px; border-radius: 5px; border: 1px solid #ccc; padding: 8px; font-family: 'Courier New', monospace; font-size: 10px; resize: none; box-sizing: border-box; }
        
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; display: none; background: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; font-size: 12px; }
        th { background: #f2f2f2; color: var(--primary); }
        
        .btn { border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; width: 100%; margin-top: 10px; }
        .btn-processar { background: var(--purple); font-size: 14px; text-transform: uppercase; }
        .btn-csv { background: var(--success); width: auto; margin-top: 15px; }
        
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; }
        .bg-red { background: var(--danger); }
        .bg-orange { background: var(--orange); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Reciclagem Vonix HSR <small style="color:var(--blue)">v3.0 - Triple Check Ativo</small></h1>
        <strong id="currentDate">10/03/2026</strong>
    </header>

    <div class="grid-inputs">
        <div class="setup-box">
            <strong>1. Histórico de Uso (D-1)</strong>
            <textarea id="inputHist" placeholder="Cole 'Uso no Mês' da Vonix..."></textarea>
        </div>
        <div class="setup-box">
            <strong>2. Online Agora (D-0)</strong>
            <textarea id="inputOnline" placeholder="Cole 'Ramais de Callcenter'..."></textarea>
        </div>
        <div class="setup-box">
            <strong>3. Chamadas de Hoje (D-0)</strong>
            <textarea id="inputChamadas" placeholder="Cole o relatório de chamadas de hoje..."></textarea>
        </div>
    </div>

    <button class="btn btn-processar" onclick="tripleCheck()">🔍 Validar Reciclagem Total</button>

    <div id="resultadoCard" class="card">
        <h3 style="margin-top:0; color:var(--danger); font-size:16px;">🚫 Ramais Confirmados para Reciclagem</h3>
        <table id="tabelaCorte">
            <thead>
                <tr>
                    <th>Ramal</th>
                    <th>Uso Histórico</th>
                    <th>Status D-0</th>
                    <th>Motivo do Corte</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
        <button class="btn btn-csv" onclick="exportarCSV()">📥 Exportar Lista de Corte (.CSV)</button>
    </div>
</div>

<script>
    function tripleCheck() {
        const histRaw = document.getElementById('inputHist').value;
        const onlineRaw = document.getElementById('inputOnline').value;
        const chamadasRaw = document.getElementById('inputChamadas').value;
        const corpo = document.getElementById('tabelaCorpo');
        const card = document.getElementById('resultadoCard');
        
        corpo.innerHTML = "";
        const ramaisAtivosD0 = new Set();

        // CHECK 2: Ramais com Agente Logado
        onlineRaw.split('\n').forEach(l => {
            const ramalMatch = l.match(/^(\d+)/);
            if (ramalMatch && (l.includes("Conectado") && /[a-zA-Z]/.test(l.split('\t')[2] || l.split(' ')[2]))) {
                ramaisAtivosD0.add(ramalMatch[1]);
            }
        });

        // CHECK 3: Ramais que fizeram chamadas hoje (Regex para pegar ramal antes do parênteses)
        chamadasRaw.split('\n').forEach(l => {
            const ramalCallMatch = l.match(/^(\d+)\s*\(/);
            if (ramalCallMatch) ramaisAtivosD0.add(ramalCallMatch[1]);
        });

        const diasUteis = [9, 6, 5]; // Exemplo 10/03
        let count = 0;

        histRaw.split('\n').forEach(linha => {
            const partes = linha.trim().split(/\s+/);
            if (partes.length < 2) return;
            const ramal = partes[0];
            if (ramal.startsWith('120') || isNaN(ramal)) return;

            const diasUsados = (linha.includes(',') ? linha.split(',').slice(1).join(',') : partes.slice(2).join(',')).split(',').map(d => parseInt(d.trim()));
            const inativoHist = !diasUteis.some(d => diasUsados.includes(d));

            // SÓ RECICLA SE: Inativo D-1 E NÃO estiver Online E NÃO tiver feito chamada
            if (inativoHist && !ramaisAtivosD0.has(ramal)) {
                count++;
                let statusD0 = "Offline";
                let motivo = "Sem atividade nos 3 checks";
                
                if (onlineRaw.includes(ramal)) {
                    statusD0 = "Conectado (Ocioso)";
                    motivo = "Sem Agente Logado";
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${ramal}</b></td>
                    <td>${diasUsados.filter(d => !isNaN(d)).join(',') || 'Nenhum'}</td>
                    <td><span class="badge ${statusD0.includes('Ocioso') ? 'bg-orange' : 'bg-red'}">${statusD0}</span></td>
                    <td>${motivo}</td>
                `;
                corpo.appendChild(tr);
            }
        });

        card.style.display = count > 0 ? 'block' : 'none';
        if (count === 0) alert("✅ Todos os ramais estão protegidos pelos filtros!");
    }

    function exportarCSV() {
        let csv = 'Ramal;Status;Motivo\n';
        document.querySelectorAll("#tabelaCorpo tr").forEach(row => {
            const cols = row.querySelectorAll("td");
            csv += `${cols[0].innerText};${cols[2].innerText};${cols[3].innerText}\n`;
        });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `reciclagem_hsr_full.csv`; a.click();
    }
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('pt-BR');
</script>
</body>
</html>
